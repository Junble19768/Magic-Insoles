# Scheme A: single IP, path-based routing (no domain required).
# Copy to /etc/nginx/conf.d/magic-insoles.conf (or sites-enabled) and adjust paths.

server {
    listen 80;
    server_name _;

    # Corporate website (external repo build output)
    location / {
        root /var/www/corp/dist;
        try_files $uri $uri/ /index.html;
    }

    # magic-insoles React SPA
    location /insoles/ {
        alias /var/www/insoles/dist/;
        try_files $uri $uri/ /insoles/index.html;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
